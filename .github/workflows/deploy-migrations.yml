name: Deploy database migrations

# Runs app/scripts/deploy-migrations.sh against production: tracked Prisma
# migrations (prisma/migrations/) applied via an elevated connection, then
# idempotent provisioning of the restricted application role. This is the
# same script app/scripts/test-integration-db.sh exercises on every
# npm run test:integration run, so there's no separate "how CI deploys"
# path to drift from "how this gets tested" — see app/README.md's
# "Running Migrations" section.
#
# Triggered manually, or automatically on pushes to main that touch the
# migration history. Either way it runs against the `production` GitHub
# Environment — configure required reviewers there (Settings > Environments)
# so a real rollout always needs a human approval, not just a green CI run.
#
# Verify locally with `act` (brew install act) against the disposable test
# database started by app/scripts/test-integration-db.sh (or your own
# postgres:16-alpine container) before trusting this on a real database:
#
#   act workflow_dispatch -W .github/workflows/deploy-migrations.yml \
#     --secret DATABASE_ADMIN_URL="postgresql://postgres:tradeos_test@host.docker.internal:55432/tradeos_test?schema=public" \
#     --secret APP_DB_ROLE_PASSWORD="tradeos_app_test" \
#     -P ubuntu-latest=catthehacker/ubuntu:act-latest
#
# (host.docker.internal, not 127.0.0.1 — act's job runs in its own container.)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "app/prisma/migrations/**"
      - "app/scripts/deploy-migrations.sh"
      - "app/scripts/provision-app-role.sh"
      - "app/scripts/sql/provision-app-role.sql"

permissions:
  contents: read

concurrency:
  # Migrations are not safe to run concurrently against the same database —
  # queue a second run rather than letting it race the first, and never
  # cancel a migration that's already in flight.
  group: deploy-migrations-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy migrations + provision app role
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Deploy migrations and provision application role
        env:
          DATABASE_ADMIN_URL: ${{ secrets.DATABASE_ADMIN_URL }}
          APP_DB_ROLE_PASSWORD: ${{ secrets.APP_DB_ROLE_PASSWORD }}
          APP_DB_ROLE_NAME: ${{ secrets.APP_DB_ROLE_NAME }}
        run: bash scripts/deploy-migrations.sh
