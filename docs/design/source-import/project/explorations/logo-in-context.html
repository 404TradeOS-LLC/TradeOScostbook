<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradeOS Nameplate — In Context</title>
<meta name="design_doc_mode" content="canvas">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#111; }
  .frame { position:absolute; width:560px; }
  .label { color:#888; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .badge-id { background:var(--color-copper); color:#000; font-weight:700; border-radius:3px; padding:2px 8px; font-size:10px; }
  .mock { border-radius:8px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.4); position:relative; }

  /* Truck door panel */
  .truck { height:340px; background: linear-gradient(160deg,#e8e6e2,#c9c6c0); display:flex; align-items:center; justify-content:center; position:relative; }
  .truck::before { content:""; position:absolute; inset:0; background: linear-gradient(100deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%); }
  .truck img { width:380px; }

  /* Hard hat */
  .hardhat-scene { height:300px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; }
  .hardhat { width:220px; height:130px; background: linear-gradient(160deg,#f2c94c,#d9a70a); border-radius:110px 110px 20px 20px; position:relative; }
  .hardhat::before { content:""; position:absolute; bottom:-10px; left:-14px; right:-14px; height:16px; background:#c99400; border-radius:0 0 10px 10px; }
  .hardhat img { position:absolute; top:38px; left:50%; transform:translateX(-50%); width:70px; }

  /* Business card */
  .card-scene { height:230px; background:#e5e5e5; display:flex; align-items:center; justify-content:center; }
  .biz-card { width:340px; height:194px; background: linear-gradient(160deg,#26282a,#0e0f10); border-radius:8px; display:flex; flex-direction:column; justify-content:space-between; padding:22px; box-shadow:0 8px 24px rgba(0,0,0,0.35); }
  .biz-card img.mark { width:190px; }
  .biz-card .contact { font-family:var(--font-mono); font-size:9px; color:#9a8f7c; letter-spacing:0.05em; line-height:1.7; }

  /* Website header */
  .web-scene { height:120px; background:var(--color-forge-black); display:flex; align-items:center; padding:0 30px; }
  .web-scene img { height:52px; }

  /* Mobile splash */
  .phone-scene { height:520px; display:flex; align-items:center; justify-content:center; background:#1a1a1a; }
  .phone { width:220px; height:460px; border-radius:32px; background:#000; border:6px solid #000; box-shadow:0 20px 50px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .phone-inner { width:100%; height:100%; background: radial-gradient(120% 100% at 50% 0%, #14181c 0%, #05070a 70%); display:flex; align-items:center; justify-content:center; }
  .phone-inner img { width:150px; }

  /* Hoodie */
  .hoodie-scene { height:340px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; }
  .hoodie { width:260px; height:280px; background: linear-gradient(160deg,#2a2a2a,#141414); border-radius:30px 30px 60px 60px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:70px; }
  .hoodie::before { content:""; position:absolute; top:-24px; left:70px; right:70px; height:60px; background:#141414; border-radius:50% 50% 0 0; }
  .hoodie img { width:90px; }
</style>
</head>
<body>

<div class="frame" style="left:40px; top:40px;">
  <div class="label"><span class="badge-id">1</span>Service truck door panel</div>
  <div class="mock truck"><img src="../assets/logos/v2/tradeos-nameplate-primary.svg"></div>
</div>

<div class="frame" style="left:640px; top:40px;">
  <div class="label"><span class="badge-id">2</span>Hard hat — heritage badge sticker</div>
  <div class="mock hardhat-scene"><div class="hardhat"><img src="../assets/logos/v2/tradeos-heritage-badge.svg"></div></div>
</div>

<div class="frame" style="left:1240px; top:40px;">
  <div class="label"><span class="badge-id">3</span>Business card</div>
  <div class="mock card-scene">
    <div class="biz-card">
      <img class="mark" src="../assets/logos/v2/tradeos-nameplate-primary.svg">
      <div class="contact">HELLO@404TRADEOS.COM<br>404TRADEOS.COM · TERRE HAUTE, IN</div>
    </div>
  </div>
</div>

<div class="frame" style="left:40px; top:420px;">
  <div class="label"><span class="badge-id">4</span>Website header</div>
  <div class="mock web-scene"><img src="../assets/logos/v2/tradeos-nameplate-primary.svg"></div>
</div>

<div class="frame" style="left:640px; top:420px;">
  <div class="label"><span class="badge-id">5</span>Hoodie — chest patch</div>
  <div class="mock hoodie-scene"><div class="hoodie"><img src="../assets/logos/v2/tradeos-heritage-badge.svg"></div></div>
</div>

<div class="frame" style="left:1240px; top:420px;">
  <div class="label"><span class="badge-id">6</span>Mobile splash screen</div>
  <div class="mock phone-scene"><div class="phone"><div class="phone-inner"><img src="../assets/logos/v2/tradeos-nameplate-mono.svg"></div></div></div>
</div>

</body>
</html>
