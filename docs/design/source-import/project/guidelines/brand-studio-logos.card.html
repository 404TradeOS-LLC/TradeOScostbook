<!-- @dsCard group="Brand Studio" viewport="700x210" name="Logos — one upload, auto-derived set" subtitle="Contractor uploads once; TradeOS generates the rest" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#fafafa; font-family: ui-sans-serif, system-ui, sans-serif; padding:20px; }
  .row { display:flex; gap:12px; align-items:center; }
  .slot { width:74px; height:74px; border-radius:10px; border:1.5px dashed #ccc; display:flex; align-items:center; justify-content:center; font-size:10px; color:#999; text-align:center; flex-shrink:0; }
  .filled { border-style:solid; border-color:#e2e2e2; background:#fff; }
  .arrow { color:#999; font-size:18px; }
  .derived { display:flex; gap:8px; }
  .mini { width:40px; height:40px; border-radius:8px; background:#fff; border:1px solid #e2e2e2; display:flex; align-items:center; justify-content:center; font-size:9px; color:#6b6b6b; }
  .cap { font-size:11px; color:#6b6b6b; margin-top:8px; }
  .badge { font-size:11px; background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; border-radius:999px; padding:3px 10px; margin-left:auto; }
</style></head>
<body>
  <div class="row">
    <div class="slot filled" style="background:#1a2e22;color:#fff;font-weight:700;font-size:15px;border:none">WR</div>
    <span class="arrow">→</span>
    <div class="derived">
      <div class="mini">Icon</div>
      <div class="mini">Favicon</div>
      <div class="mini" style="filter:grayscale(1)">Mono</div>
      <div class="mini">Print</div>
      <div class="mini" style="background:#1a2e22;color:#fff">Dark</div>
    </div>
    <span class="badge">Auto-generated</span>
  </div>
  <div class="cap">Upload one logo — TradeOS creates the icon, favicon, monochrome, print-safe, and dark variants automatically.</div>
</body></html>
