<!-- @dsCard group="Brand Studio" viewport="700x260" name="Preview Lab" subtitle="One screen, every branded surface at once" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#fafafa; font-family: ui-sans-serif, system-ui, sans-serif; padding:18px; }
  .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .title { font-size:14px; font-weight:600; color:#1c1c1c; }
  .toggle { display:flex; gap:4px; background:#eee; border-radius:7px; padding:2px; }
  .toggle span { font-size:11px; padding:4px 10px; border-radius:5px; color:#6b6b6b; }
  .toggle span.on { background:#fff; color:#1c1c1c; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
  .grid { display:grid; grid-template-columns: repeat(5,1fr); gap:10px; }
  .thumb { background:#fff; border:1px solid #e2e2e2; border-radius:8px; overflow:hidden; height:120px; display:flex; flex-direction:column; }
  .thumb .top { flex:1; background:#1a2e22; }
  .thumb .bot { padding:6px 8px; font-size:9px; color:#6b6b6b; }
  .thumb.email .top { background:#fff; padding:8px; }
  .thumb.email .bar { height:6px; width:60%; background:#e2e2e2; border-radius:3px; margin-bottom:4px; }
  .thumb.invoice .top { background:#fff; padding:8px; }
  .thumb.invoice .ln { height:4px; background:#eee; border-radius:2px; margin-bottom:5px; }
</style></head>
<body>
  <div class="head"><span class="title">Preview Lab</span><div class="toggle"><span class="on">Desktop</span><span>Mobile</span></div></div>
  <div class="grid">
    <div class="thumb"><div class="top"></div><div class="bot">Proposal cover</div></div>
    <div class="thumb invoice"><div class="top"><div class="ln" style="width:80%"></div><div class="ln" style="width:60%"></div><div class="ln" style="width:70%"></div><div class="ln" style="width:40%"></div></div><div class="bot">Invoice</div></div>
    <div class="thumb"><div class="top"></div><div class="bot">Contract signature</div></div>
    <div class="thumb email"><div class="top"><div class="bar"></div><div class="bar" style="width:40%"></div></div><div class="bot">Proposal email</div></div>
    <div class="thumb"><div class="top" style="background:#f4f4f4"></div><div class="bot">Client portal</div></div>
  </div>
</body></html>
