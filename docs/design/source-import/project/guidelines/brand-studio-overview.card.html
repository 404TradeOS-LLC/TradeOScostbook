<!-- @dsCard group="Brand Studio" viewport="700x260" name="Overview — completion + readiness" subtitle="Blueprint register: plain-language checklist, two distinct scores" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  :root { --bp-bg:#fafafa; --bp-card:#fff; --bp-border:#e2e2e2; --bp-fg:#1c1c1c; --bp-muted:#6b6b6b; --copper:#B87333; --green:#16a34a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bp-bg); font-family: ui-sans-serif, system-ui, sans-serif; padding:20px; }
  .grid { display:grid; grid-template-columns: 1.2fr 1fr; gap:14px; }
  .card { background:var(--bp-card); border:1px solid var(--bp-border); border-radius:10px; padding:16px; }
  .ring { width:56px; height:56px; border-radius:50%; background: conic-gradient(var(--copper) 0 60%, #eee 60% 100%); display:flex; align-items:center; justify-content:center; }
  .ring span { width:42px; height:42px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--bp-fg); }
  .row { display:flex; align-items:center; gap:12px; }
  .label { font-size:13px; color:var(--bp-muted); }
  .title { font-size:14px; font-weight:600; color:var(--bp-fg); margin:0 0 2px; }
  ul { list-style:none; margin:10px 0 0; padding:0; display:flex; flex-direction:column; gap:8px; }
  li { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--bp-fg); }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--copper); flex-shrink:0; }
  .done { color:var(--bp-muted); text-decoration: line-through; }
  .done .dot { background:var(--green); }
  .btn { display:inline-flex; align-items:center; font-size:13px; font-weight:500; padding:7px 12px; border-radius:7px; background:var(--bp-fg); color:#fff; margin-top:12px; }
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="row"><div class="ring"><span>60%</span></div><div><div class="title">Your company brand</div><div class="label">3 of 5 set up</div></div></div>
      <ul>
        <li class="done"><span class="dot"></span>Logo added</li>
        <li class="done"><span class="dot"></span>Colors set</li>
        <li class="done"><span class="dot"></span>Company story added</li>
        <li><span class="dot"></span>Add a license number</li>
        <li><span class="dot"></span>Add team photos</li>
      </ul>
      <div class="btn">Finish your brand →</div>
    </div>
    <div class="card">
      <div class="title">Document readiness</div>
      <div class="label" style="margin-bottom:10px">Separate from brand setup — legal &amp; business info</div>
      <div class="row" style="gap:8px;margin-bottom:8px"><span class="dot" style="background:var(--green)"></span><span style="font-size:13px">Insurance on file</span></div>
      <div class="row" style="gap:8px;margin-bottom:8px"><span class="dot"></span><span style="font-size:13px;color:var(--bp-muted)">Missing: license number</span></div>
      <div class="row" style="gap:8px"><span class="dot" style="background:var(--green)"></span><span style="font-size:13px">Payment info added</span></div>
    </div>
  </div>
</body></html>
