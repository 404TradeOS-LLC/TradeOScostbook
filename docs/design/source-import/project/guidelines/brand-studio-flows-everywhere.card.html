<!-- @dsCard group="Brand Studio" viewport="700x260" name="Branding flows everywhere" subtitle="One upload → documents, portal, email, client-facing pages" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#fafafa; font-family: ui-sans-serif, system-ui, sans-serif; padding:20px; }
  .flow { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .src { width:52px; height:52px; border-radius:10px; background:#2f6b46; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; flex-shrink:0; }
  .arrow { color:#999; font-size:16px; }
  .grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  .thumb { background:#fff; border:1px solid #e2e2e2; border-radius:8px; height:90px; display:flex; flex-direction:column; overflow:hidden; }
  .thumb .top { flex:1; background:#16241b; }
  .thumb .bot { font-size:9px; color:#6b6b6b; padding:5px 7px; }
  .thumb.email .top { background:#fff; padding:8px; }
  .thumb.email .bar { height:5px; background:#eee; border-radius:2px; margin-bottom:3px; }
  .thumb.email .bar.accent { background:#2f6b46; width:30%; }
  .thumb.portal .top { background:#f4f4f4; position:relative; }
  .thumb.portal .top::before { content:""; position:absolute; top:0; left:0; width:4px; height:100%; background:#2f6b46; }
  .cap { font-size:12px; color:#6b6b6b; }
</style></head>
<body>
  <div class="flow"><div class="src">WR</div><span class="arrow">→</span><span class="cap">One logo + color upload flows into everything below — no re-uploading per surface.</span></div>
  <div class="grid">
    <div class="thumb"><div class="top"></div><div class="bot">Proposal / invoice</div></div>
    <div class="thumb portal"><div class="top"></div><div class="bot">Client portal</div></div>
    <div class="thumb email"><div class="top"><div class="bar accent"></div><div class="bar" style="width:70%"></div><div class="bar" style="width:50%"></div></div><div class="bot">Emails</div></div>
    <div class="thumb"><div class="top" style="background:#fff;border-left:4px solid #2f6b46"></div><div class="bot">Payment page</div></div>
  </div>
</body></html>
