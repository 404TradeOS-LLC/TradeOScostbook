<!-- @dsCard group="Brand Studio" viewport="700x220" name="Colors — where they appear" subtitle="Semantic mapping shown as annotated preview, not a settings grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#fafafa; font-family: ui-sans-serif, system-ui, sans-serif; padding:20px; display:flex; gap:20px; }
  .picker { flex: 0 0 220px; }
  .sw { display:flex; gap:8px; margin-bottom:12px; }
  .chip { width:34px; height:34px; border-radius:8px; border:1px solid rgba(0,0,0,0.1); }
  .lbl { font-size:12px; color:#6b6b6b; margin-bottom:4px; }
  .warn { font-size:12px; background:#fffbeb; border:1px solid #fde68a; color:#92400e; border-radius:6px; padding:8px 10px; margin-top:10px; }
  .preview { flex:1; background:#fff; border:1px solid #e2e2e2; border-radius:10px; padding:0; position:relative; overflow:hidden; }
  .cover { height:130px; background:#1a2e22; position:relative; display:flex; align-items:flex-end; padding:14px; }
  .cover .accent { position:absolute; top:0; left:0; width:5px; height:100%; background:#2f6b46; }
  .cover .name { color:#fff; font-weight:600; font-size:15px; }
  .btnrow { padding:12px 14px; display:flex; justify-content:flex-end; }
  .cta { background:#2f6b46; color:#fff; font-size:12px; padding:6px 12px; border-radius:6px; }
  .tag { position:absolute; top:8px; right:8px; font-size:10px; background:rgba(47,107,70,0.15); color:#2f6b46; padding:3px 8px; border-radius:999px; }
</style></head>
<body>
  <div class="picker">
    <div class="lbl">Primary color</div>
    <div class="sw"><div class="chip" style="background:#2f6b46"></div><div class="chip" style="background:#1a2e22"></div><div class="chip" style="background:#4a3728"></div></div>
    <div class="lbl">Secondary color</div>
    <div class="sw"><div class="chip" style="background:#e8e3d8"></div></div>
    <div class="warn">Your secondary color is hard to read on white. We'll darken it slightly on documents.</div>
  </div>
  <div class="preview">
    <div class="cover"><span class="tag">Primary color</span><span class="accent"></span><span class="name">Wabash Roofing Co.</span></div>
    <div class="btnrow"><span class="cta">Sign proposal</span></div>
  </div>
</body></html>
