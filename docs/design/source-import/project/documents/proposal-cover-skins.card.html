<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="frame.css">
<style>
  body { margin:0; background:#eee; padding:20px; font-family: ui-sans-serif, system-ui, sans-serif; }
  .row { display:flex; gap:16px; }
  .card { flex:1; height:380px; border-radius:8px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.12); }
</style></head>
<body>
  <div class="row">
    <div class="card doc-frame" style="--doc-primary:#2f6b46; --doc-cover-bg:#122019;">
      <div class="doc-cover" style="height:100%">
        <span class="doc-accent"></span>
        <div class="doc-logo"><span class="mark">WR</span>Wabash Roofing Co.</div>
        <div class="doc-title-block">
          <div class="doc-doctype">Proposal</div>
          <h1>Full roof replacement<br>1420 Maple St.</h1>
          <div class="doc-meta"><span>Prepared for R. Delgado</span><span>July 2026</span><span>v1</span></div>
        </div>
      </div>
    </div>
    <div class="card doc-frame" style="--doc-primary:#1d5fb8; --doc-cover-bg:#0f1b2e;">
      <div class="doc-cover" style="height:100%">
        <span class="doc-accent"></span>
        <div class="doc-logo"><span class="mark">VE</span>Voltline Electric</div>
        <div class="doc-title-block">
          <div class="doc-doctype">Proposal</div>
          <h1>Panel upgrade &amp;<br>whole-home rewire</h1>
          <div class="doc-meta"><span>Prepared for Terre Haute Storage</span><span>July 2026</span><span>v2</span></div>
        </div>
      </div>
    </div>
  </div>
</body></html>
